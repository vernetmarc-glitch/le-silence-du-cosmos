<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html,body{margin:0;padding:0;width:100%;height:100vh;height:100dvh;overflow:hidden;background:#000;color:#fff;font-family:monospace;display:flex;flex-direction:column;}
#info{background:#111;padding:8px;font-size:11px;flex-shrink:0;}
#canvas-wrap{flex:1;min-height:0;position:relative;background:#003;}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
#bar{background:#222;padding:8px;flex-shrink:0;font-size:11px;}
</style>
</head>
<body>
<div id="info">Chargement...</div>
<div id="canvas-wrap">
  <canvas id="c"></canvas>
</div>
<div id="bar">BARRE DU BAS</div>
<script>
const info = document.getElementById('info');
const wrap = document.getElementById('canvas-wrap');
const c = document.getElementById('c');
const ctx = c.getContext('2d');

function update() {
  c.width = wrap.clientWidth;
  c.height = wrap.clientHeight;
  
  // Dessiner un dégradé simple
  const g = ctx.createRadialGradient(c.width/2, c.height/2, 0, c.width/2, c.height/2, c.width/2);
  g.addColorStop(0, '#4aaeff');
  g.addColorStop(1, '#000005');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#fff';
  ctx.font = '16px monospace';
  ctx.fillText('Canvas OK', c.width/2 - 40, c.height/2);

  info.textContent = 
    'Window: ' + window.innerWidth + 'x' + window.innerHeight + 
    ' | wrap: ' + wrap.clientWidth + 'x' + wrap.clientHeight +
    ' | screen: ' + screen.width + 'x' + screen.height +
    ' | ratio: ' + devicePixelRatio;
}

window.addEventListener('resize', update);
update();
</script>
</body>
</html>
